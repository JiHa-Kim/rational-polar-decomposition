[project]
name = "polar-decomposition"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "numpy>=2.4.4",
    "torch>=2.11.0",
    "triton-windows>=3.6.0.post26; sys_platform == 'win32'",
]

[project.scripts]
bench = "polar_decomposition.bench:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[[tool.uv.index]]
name = "pytorch-cuda"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = [{ index = "pytorch-cuda" }]
torchvision = [{ index = "pytorch-cuda" }]
torchaudio = [{ index = "pytorch-cuda" }]
[tool.ruff]
ignore = ["E741"]

[tool.ruff.lint]
ignore = ["E741"]
